name: import-test

on:
  workflow_dispatch:
    inputs:
      indexUrl:
        description: "Index Url"
        required: true
        default: "https://test.pypi.org/simple/"
      version:
        description: "version"
        required: false
        default: ""

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Check which python we use
        run: which python

      - name: Install ODBC runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y unixodbc
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install unixodbc
          else
            echo "Windows provides the ODBC Driver Manager through odbc32.dll."
          fi

      - name: Install ConnectorX - POSIX
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          pip install numpy importlib-metadata

          version='${{ github.event.inputs.version }}'
          if [ -z $version ]
          then
            pip install --index-url ${{ github.event.inputs.indexUrl }} connectorx
          else
            pip install --index-url ${{ github.event.inputs.indexUrl }} connectorx==$version
          fi

      - name: Install ConnectorX - Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          pip install numpy importlib-metadata

          $version = '${{ github.event.inputs.version }}'
          if ($version) {
            pip install --index-url ${{ github.event.inputs.indexUrl }} connectorx==$version
          } else { 
            pip install --index-url ${{ github.event.inputs.indexUrl }} connectorx
          }

      - name: Import
        shell: bash
        run: |
          python -c "from connectorx import read_sql"
          python scripts/odbc_runtime_smoke.py \
            --json "odbc-runtime-${{ matrix.os }}-${{ matrix.python-version }}.json" \
            --summary "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "import-test-odbc-runtime-${{ matrix.os }}-${{ matrix.python-version }}"
          path: "odbc-runtime-${{ matrix.os }}-${{ matrix.python-version }}.json"
          if-no-files-found: warn
