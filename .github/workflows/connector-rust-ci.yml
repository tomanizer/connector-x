name: connector-rust-ci

on:
  pull_request:
    branches:
      - main
      - prerelease
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_os:
        description: OS runner to use for a manual connector check
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
          - windows-latest

jobs:
  connector-rust:
    name: connector-rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.target_os) || '["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux ODBC dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev odbc-postgresql pkg-config libssl-dev libkrb5-dev libclang-dev

      - name: Install macOS ODBC dependencies
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Initialize ODBC-family coverage summary
        shell: bash
        run: echo "### ODBC-family coverage" >> "$GITHUB_STEP_SUMMARY"

      - name: Record ODBC runtime metadata
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/odbc_runtime_smoke.py \
            --json "odbc-runtime-${{ runner.os }}.json" \
            --summary "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        if: always() && runner.os != 'Windows'
        with:
          name: "connector-rust-odbc-runtime-${{ runner.os }}"
          path: "odbc-runtime-${{ runner.os }}.json"
          if-no-files-found: warn

      - name: Check Sybase connector
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_sybase' connectorx/Cargo.toml; then
            echo "src_sybase is not present on this branch; skipping Sybase connector checks."
            echo "- Sybase: skipped because src_sybase is absent on this branch." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          features="src_sybase dst_arrow fptr"
          cargo check -p connectorx --no-default-features --features "$features"
          cargo clippy -p connectorx --no-default-features --features "$features"
          cargo test -p connectorx --no-default-features --features "$features" --test test_sybase -- --nocapture
          if [ "$RUNNER_OS" != "Windows" ]; then
            cargo bench -p connectorx --no-default-features --features "$features" --bench sybase_odbc --no-run
          else
            echo "Skipping Sybase benchmark build on Windows because pprof does not compile there."
          fi
          echo "- Sybase: compile/clippy/unit coverage ran. Live tests are env-gated and print CONNECTORX_SKIP when SYBASE_* variables are absent." >> "$GITHUB_STEP_SUMMARY"

      - name: Check Db2 connector
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_db2' connectorx/Cargo.toml; then
            echo "src_db2 is not present on this branch; skipping Db2 connector checks."
            echo "- Db2: skipped because src_db2 is absent on this branch." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          features="src_db2 dst_arrow fptr"
          cargo check -p connectorx --no-default-features --features "$features"
          cargo clippy -p connectorx --no-default-features --features "$features"
          cargo test -p connectorx --no-default-features --features "$features" --test test_db2 -- --nocapture
          if [ "$RUNNER_OS" != "Windows" ]; then
            cargo bench -p connectorx --no-default-features --features "$features" --bench db2_odbc --no-run
          else
            echo "Skipping Db2 benchmark build on Windows because pprof does not compile there."
          fi
          echo "- Db2: compile/clippy/unit coverage ran. Live tests are env-gated and print CONNECTORX_SKIP when DB2_* variables are absent." >> "$GITHUB_STEP_SUMMARY"

      - name: Check generic ODBC connector
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_odbc' connectorx/Cargo.toml; then
            echo "src_odbc is not present on this branch; skipping generic ODBC connector checks."
            echo "- Generic ODBC: skipped because src_odbc is absent on this branch." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          features="src_odbc dst_arrow fptr"
          cargo check -p connectorx --no-default-features --features "$features"
          cargo clippy -p connectorx --no-default-features --features "$features"
          cargo test -p connectorx --no-default-features --features "$features" --test test_odbc -- --nocapture
          echo "- Generic ODBC: compile/clippy/unit coverage ran. Env-gated live tests print CONNECTORX_SKIP when ODBC_* variables are absent." >> "$GITHUB_STEP_SUMMARY"

      - name: Run generic ODBC PostgreSQL testcontainer coverage
        if: runner.os == 'Linux'
        shell: bash
        env:
          CONNECTORX_ODBC_TESTCONTAINER: "1"
        run: |
          set -euo pipefail
          if ! grep -q 'src_odbc' connectorx/Cargo.toml; then
            echo "src_odbc is not present on this branch; skipping PostgreSQL ODBC testcontainer checks."
            echo "- Generic ODBC PostgreSQL testcontainer: skipped because src_odbc is absent." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          docker ps
          odbcinst -q -d
          cargo test -p connectorx --no-default-features --features "src_odbc dst_arrow fptr" --test test_odbc -- --nocapture --test-threads=1
          echo "- Generic ODBC PostgreSQL testcontainer: live driver coverage ran with CONNECTORX_ODBC_TESTCONTAINER=1 and no repository secrets." >> "$GITHUB_STEP_SUMMARY"
