name: odbc-live

on:
  workflow_dispatch:
    inputs:
      backend:
        description: "ODBC backend to test"
        required: true
        type: choice
        options:
          - sybase
          - db2
          - postgres
          - odbc
          - both

jobs:
  live-odbc:
    if: inputs.backend != 'postgres'
    runs-on: ubuntu-latest
    env:
      SYBASE_URL: ${{ secrets.SYBASE_URL }}
      SYBASE_ODBC_CONN: ${{ secrets.SYBASE_ODBC_CONN }}
      DB2_URL: ${{ secrets.DB2_URL }}
      DB2_ODBC_CONN: ${{ secrets.DB2_ODBC_CONN }}
      ODBC_URL: ${{ secrets.ODBC_URL }}
      ODBC_CONN: ${{ secrets.ODBC_CONN }}
      ODBC_TEST_QUERY: ${{ secrets.ODBC_TEST_QUERY }}
      ODBC_EXPECTED_ROWS: ${{ secrets.ODBC_EXPECTED_ROWS }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install ODBC dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev pkg-config libssl-dev libkrb5-dev libclang-dev

      - name: Run live Sybase tests
        if: inputs.backend == 'sybase' || inputs.backend == 'both'
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_sybase' connectorx/Cargo.toml; then
            echo "src_sybase is not present on this branch; skipping."
            exit 0
          fi
          if [ -z "${SYBASE_URL:-}" ] && [ -z "${SYBASE_ODBC_CONN:-}" ]; then
            echo "Set SYBASE_URL and/or SYBASE_ODBC_CONN repository secrets to run live Sybase tests."
            exit 1
          fi
          cargo test -p connectorx --no-default-features --features "src_sybase dst_arrow" --test test_sybase -- --nocapture

      - name: Run live Db2 tests
        if: inputs.backend == 'db2' || inputs.backend == 'both'
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_db2' connectorx/Cargo.toml; then
            echo "src_db2 is not present on this branch; skipping."
            exit 0
          fi
          if [ -z "${DB2_URL:-}" ] && [ -z "${DB2_ODBC_CONN:-}" ]; then
            echo "Set DB2_URL and/or DB2_ODBC_CONN repository secrets to run live Db2 tests."
            exit 1
          fi
          cargo test -p connectorx --no-default-features --features "src_db2 dst_arrow" --test test_db2 -- --nocapture

      - name: Run live generic ODBC tests
        if: inputs.backend == 'odbc' || inputs.backend == 'both'
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'src_odbc' connectorx/Cargo.toml; then
            echo "src_odbc is not present on this branch; skipping."
            exit 0
          fi
          if [ -z "${ODBC_TEST_QUERY:-}" ] || { [ -z "${ODBC_URL:-}" ] && [ -z "${ODBC_CONN:-}" ]; }; then
            echo "Set ODBC_TEST_QUERY plus ODBC_URL and/or ODBC_CONN repository secrets to run live generic ODBC tests."
            exit 1
          fi
          cargo test -p connectorx --no-default-features --features "src_odbc dst_arrow fptr" --test test_odbc -- --nocapture

  live-postgres-odbc:
    if: inputs.backend == 'postgres' || inputs.backend == 'both'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: connectorx
          POSTGRES_PASSWORD: connectorx
          POSTGRES_DB: connectorx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U connectorx -d connectorx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      PGPASSWORD: connectorx
      ODBC_CONN: Driver={PostgreSQL Unicode};Server=127.0.0.1;Port=5432;Database=connectorx;UID=connectorx;PWD=connectorx;
      ODBC_URL: odbc://connectorx:connectorx@127.0.0.1:5432/connectorx?driver=PostgreSQL%20Unicode
      ODBC_TEST_QUERY: select id, flag, name from cx_odbc_test order by id
      ODBC_PARTITION_QUERY: select id, flag, name from cx_odbc_test
      ODBC_PARTITION_COLUMN: id
      ODBC_EXPECTED_ROWS: "2"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL ODBC dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev odbc-postgresql postgresql-client pkg-config libssl-dev libkrb5-dev libclang-dev
          odbcinst -q -d

      - name: Seed PostgreSQL test data
        run: |
          psql -h 127.0.0.1 -U connectorx -d connectorx -f scripts/odbc_postgres.sql

      - name: Run generic ODBC tests against PostgreSQL
        run: |
          cargo test -p connectorx --no-default-features --features "src_odbc dst_arrow fptr" --test test_odbc -- --nocapture
